<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2d7aee"/>
      <stop offset="100%" stop-color="#0b338a"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Center (32,38), radius 19 -->
  <!-- 8-o'clock (150°): x=32−19*0.866=32−16.5=15.5≈16, y=38+19*0.5=38+9.5=47.5≈48 -->
  <!-- 4-o'clock (30°):  x=32+16.5=48.5≈49, y=47.5≈48 -->
  <!-- Track -->
  <path d="M 16,48 A 19,19 0 1,1 49,48" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Fill arc 70% (at 318°): x=32+19*0.743=32+14.1=46.1≈46, y=38−19*0.669=38−12.7=25.3≈25 -->
  <path d="M 16,48 A 19,19 0 0,1 46,25" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Needle: to radius 14 → x=32+14*0.743=42.4≈42, y=38−14*0.669=38−9.4=28.6≈29 -->
  <line x1="32" y1="38" x2="42" y2="29" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Hub -->
  <circle cx="32" cy="38" r="3.5" fill="white"/>
</svg>
