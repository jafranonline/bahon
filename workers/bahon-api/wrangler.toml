name = "bahon-api"
main = "src/index.ts"
compatibility_date = "2025-01-09"
compatibility_flags = ["nodejs_compat"]

# Cloudflare Email Service (Email Sending) — verification & password-reset
# emails (TASK-069). Requires Workers Paid + a verified sender domain.
# NOTE: must stay a top-level key, above the [ai]/[[...]] table headers — a
# bare key placed after a table header would be parsed into that table.
send_email = [
  { name = "EMAIL" },
]

# Workers AI binding — powers both Whisper STT (/api/transcribe) and the
# LLM agent with tool calling (/api/chat). No external API keys required.
[ai]
binding = "AI"

# D1 — users, subscriptions, refresh tokens (Phase 15).
[[d1_databases]]
binding = "DB"
database_name = "bahon-db"
database_id = "0c5fd666-35f9-41dd-8673-b69db33318ae"

# R2 — one JSON snapshot per user for cloud sync (Phase 15).
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "bahon-user-data"

# Plain (non-secret) vars.
[vars]
# Sender must be on a domain with SPF+DKIM set up for Cloudflare email.
# The root jafran.online is configured (MX/SPF/DKIM via Email Routing); the
# bahon.jafran.online subdomain is NOT and has DMARC p=reject, so mail from it
# is rejected by receivers. Send from the root domain instead.
FROM_EMAIL = "Bahon <no-reply@jafran.online>"
APP_ORIGIN = "https://bahon.jafran.online"
