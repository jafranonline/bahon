name = "bahon-api"
main = "src/index.ts"
compatibility_date = "2025-01-09"
compatibility_flags = ["nodejs_compat"]

# Workers AI binding — powers both Whisper STT (/api/transcribe) and the
# LLM agent with tool calling (/api/chat). No external API keys required.
[ai]
binding = "AI"

# D1 — users, subscriptions, refresh tokens (Phase 15).
[[d1_databases]]
binding = "DB"
database_name = "bahon-db"
database_id = "0c5fd666-35f9-41dd-8673-b69db33318ae"

# R2 — one JSON snapshot per user for cloud sync (Phase 15).
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "bahon-user-data"
