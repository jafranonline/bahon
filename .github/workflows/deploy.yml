name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm test -- --run
      - run: npm run build
      - uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: bahon
          directory: dist

  deploy-worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/bahon-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22' # wrangler 4.x requires Node >= 22
      - run: npm ci
      - run: npx tsc --noEmit
      # Deploy only on push to main (not PRs). Skips gracefully when the
      # Cloudflare token secret is absent, so CI stays green until it is added;
      # once the secret exists, every push auto-deploys the Worker.
      # The ANTHROPIC_API_KEY Worker secret is set once out-of-band
      # (`wrangler secret put` / dashboard) and persists across deploys.
      - name: Deploy worker (if credentials present)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::warning::CLOUDFLARE_API_TOKEN not set — skipping Worker deploy. Add the repo secret to enable auto-deploy."
            exit 0
          fi
          npx wrangler deploy
